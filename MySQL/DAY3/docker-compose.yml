services:

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: blog
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 3306:3306

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379

  web:
    build: .
    ports:
      - 8000:8000
    
    env_file: .env
    environment:
      MYSQL_HOST: mysql
      REDIS_HOST: redis

    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:



